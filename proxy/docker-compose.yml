# Front proxy CHUNG cho LATVPS.
# nginx-proxy: tự route domain theo VIRTUAL_HOST của container _web mỗi site (qua docker.sock).
# acme-companion: tự xin Let's Encrypt khi container set LETSENCRYPT_HOST.
# Origin cert: thả /opt/proxy/certs/<domain>.crt + <domain>.key, KHÔNG set LETSENCRYPT_HOST -> nginx-proxy dùng cert đó.
name: latvps-proxy

services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:latest
    container_name: latvps_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - /opt/proxy/certs:/etc/nginx/certs
      - nginx_vhost:/etc/nginx/vhost.d
      - nginx_html:/usr/share/nginx/html
    networks:
      - proxy

  acme-companion:
    image: nginxproxy/acme-companion:latest
    container_name: latvps_acme
    restart: unless-stopped
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme:/etc/acme.sh
    environment:
      DEFAULT_EMAIL: ${ACME_EMAIL:-admin@example.com}
      NGINX_PROXY_CONTAINER: latvps_proxy
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: latvps_proxy

volumes:
  nginx_vhost:
  nginx_html:
  acme:
