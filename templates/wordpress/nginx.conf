# nginx của container _web mỗi WP site. Phục vụ static + fastcgi tới php-fpm (service 'php' cùng network internal).
# Tĩnh (không cần token) - fastcgi_pass dùng tên service 'php'. X-Forwarded-Proto từ nginx-proxy được
# chuyển tới php-fpm dạng HTTP_X_FORWARDED_PROTO -> mu-plugin proxy-ssl nhận biết HTTPS.

# Rate-limit chống brute-force wp-login (mỗi IP ~10 req/phút). Mỗi site 1 nginx riêng nên zone riêng.
limit_req_zone $binary_remote_addr zone=wplogin:10m rate=10r/m;

server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php index.html;
    client_max_body_size 64m;

    # Security headers (defense-in-depth).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # wp-login: giới hạn tần suất (chống brute-force) trước khi chạy PHP.
    location = /wp-login.php {
        limit_req zone=wplogin burst=5 nodelay;
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 300;
    }

    # === Webshell protection (bài học từ farm khác) ===
    # Cấm thực thi PHP trong thư mục upload - vector webshell phổ biến nhất.
    location ~* ^/wp-content/uploads/.*\.(php|phtml|phar|php[0-9])$ { deny all; }
    # Cấm chạy PHP trong wp-content/cache, wp-includes (không phải nơi để chạy PHP trực tiếp).
    location ~* ^/(?:wp-content/cache|wp-includes)/.*\.php$ { deny all; }
    # xmlrpc.php hay bị brute-force / pingback DDoS - chặn (AffiliateCMS không cần).
    location = /xmlrpc.php { deny all; }
    # File nhạy cảm (backup/log/script/config dump).
    location ~* \.(sql|bak|old|log|sh|ini|env|conf)$ { deny all; }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
        # LƯU Ý nginx: nếu location có BẤT KỲ add_header thì KHÔNG kế thừa add_header từ server{}.
        # -> lặp lại security header ở đây cho response PHP. Nếu sau này thêm FastCGI cache
        #    (add_header X-Cache ...), PHẢI giữ nguyên 3 dòng dưới kẻo mất header.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location ~ /\.(ht|git) { deny all; }
}
