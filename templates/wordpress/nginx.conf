# nginx của container _web mỗi WP site. Phục vụ static + fastcgi tới php-fpm (service 'php' cùng network internal).
# Tĩnh (không cần token) — fastcgi_pass dùng tên service 'php'. X-Forwarded-Proto từ nginx-proxy được
# chuyển tới php-fpm dạng HTTP_X_FORWARDED_PROTO -> mu-plugin proxy-ssl nhận biết HTTPS.
server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php index.html;
    client_max_body_size 64m;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location ~ /\.(ht|git) { deny all; }
}
